<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <link rel="icon" type="image/svg+xml" href="./src/assets/svg/opentracker.svg" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Open Tracker</title>
   </head>
   <body>
      <div id="app">
         <header class="top-bar">
            <h1>Open Tracker</h1>
         </header>
         <main>
            <section class="stats">
               <h2>Energy:</h2>
               <div class="energy-grid">
                  <div class="circle" id="eaten-cals">0</div>
                  <div class="big-circle" >
                     <div class="mask-circle">
                        <h2 id="total-cals">0</h2>
                        <p>kcal</p>
                     </div>    
                  </div>
                  <div class="circle" id="burned-cals">0</div>
                  <p class="stat-text">Eaten</p>
                  <h2 class="stat-text">Total</h2>
                  <p class="stat-text">Burned</p>
               </div>
               <div id="calorie-counter"></div>
            </section>
            <section class="inputs">
               <div class="button-container">
                  <button popovertarget="add-meal-menu" id="add-meal-menu-button"><div>Add Meal</div></button>
                  <button popovertarget="add-activity-menu" id="add-activity-menu-button"><div>Add Activity</div></button>
               </div>

               <div id="add-meal-menu" class="menu" popover="auto">
                  <button popovertarget="add-meal-menu" class="X close-popover" >✖</button>
                  <div class="form-grid">
                     <label for="meal-type">Meal Type</label>
                     <div></div>
                     <select class="input" name="meal-type" id="meal-type">
                        <option value="" disabled selected>Select</option>
                        <option value="breakfast">Breakfast</option>
                        <option value="lunch">Lunch</option>
                        <option value="dinner">Dinner</option>
                        <option value="snack">Snack</option>
                     </select>
                     <div></div>

                     <label for="meal-name">Meal Name</label>
                     <div></div>
                     <input class="input" type="text" name="meal-name" id="meal-name" placeholder="Meal">
                     <div></div>

                     <label for="meal-calories">Energy</label>
                     <div></div>
                     <div class="input-wrapper">
                        <input class="input" type="number" name="meal-calories" id="meal-calories"  inputmode="decimal"  value="0">
                        <span class="units">kcal</span>
                     </div>
                     <div></div>

                     <label for="meal-protein">Protein</label>
                     <div></div>
                     <div class="input-wrapper">
                        <input class="input" type="number" name="meal-protein" id="meal-protein"  inputmode="decimal"  value="0">
                        <span class="units">g</span>
                     </div>
                     <div></div>

                     <label for="meal-fats">Fats</label>
                     <div></div>
                     <div class="input-wrapper">
                        <input class="input" type="number" name="meal-fats" id="meal-fats"  inputmode="decimal"  value="0">
                        <span class="units">g</span>
                     </div>
                     <div></div>

                     <label for="meal-carbs">Carbs</label>
                     <div></div>
                     <div class="input-wrapper">
                        <input class="input" type="number" name="meal-carbs" id="meal-carbs"  inputmode="decimal"  value="0">
                        <span class="units">g</span>
                     </div>
                     <div></div>

                  </div>

                  <button type="submit" id="add-meal">Add</button>
               </div>
               
               <div id="add-activity-menu" class="menu" popover="auto">
                  <button popovertarget="add-activity-menu" class="X close-popover" >✖</button>
                  <div class="form-grid">
                     <label for="activity-name">Activity Name</label>
                     <div></div>
                     <input class="input" type="text" name="activity-name" id="activity-name" placeholder="Cardio">
                     <div></div>

                     <label for="activity-calories">Energy</label>
                     <div></div>
                     <div class="input-wrapper">
                        <input class="input" type="number" name="activity-calories" id="activity-calories"  inputmode="decimal"  value="0">
                        <span class="units">kcal</span>
                     </div>
                     <div></div>
                  </div>

                  <button type="submit" id="add-activity">Add</button>
               </div>  

            </section>
            <section class="listed-meals">
               <button id="reset-button">Reset</button>
               <h3>🍔Meals eaten today:</h3>
               <ul id="meals-list" class="meals">
               </ul>
            </section>
            <section class="listed-activities">
               <h3>🏃‍♂️Todays activities:</h3>
               <ul id="activity-list" class="meals">
               </ul>
            </section>
         </main>
      </div>
      <script type="module" src="/src/main.js"></script>
      <script type="module" src="/src/js/get-stats.js"></script>
   </body>
</html>
